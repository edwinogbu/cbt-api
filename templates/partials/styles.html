{{define "styles"}}
<style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f4; }
    .container { max-width: 600px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .header { background: #4a90e2; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
    .code-box { background: #f0f0f0; padding: 15px; text-align: center; font-size: 24px; letter-spacing: 5px; margin: 20px 0; border-radius: 5px; font-family: monospace; }
    .footer { text-align: center; padding: 20px; font-size: 12px; color: #777; }
    .small { font-size: 12px; color: #999; }
    hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    a { color: #4a90e2; text-decoration: none; }
</style>
{{end}}
