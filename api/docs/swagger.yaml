basePath: /api/v1
definitions:
  dto.BulkDeleteRequest:
    properties:
      question_ids:
        items:
          type: string
        type: array
    required:
    - question_ids
    type: object
  dto.CancelSubscriptionRequest:
    properties:
      cancel_immediately:
        type: boolean
      reason:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  dto.CreateClassArmRequest:
    properties:
      arm_code:
        type: string
      capacity:
        type: integer
      name:
        type: string
      room_number:
        type: string
      school_id:
        type: string
      sort_order:
        type: integer
    required:
    - name
    - school_id
    type: object
  dto.CreateClassLevelRequest:
    properties:
      category:
        enum:
        - JSS
        - SSS
        - PRIMARY
        type: string
      level_number:
        type: integer
      name:
        type: string
      promotion_to:
        type: string
      school_id:
        type: string
      sort_order:
        type: integer
    required:
    - category
    - level_number
    - name
    - school_id
    type: object
  dto.CreateClassRequest:
    properties:
      class_arm_id:
        type: string
      class_level_id:
        type: string
      room_number:
        type: string
      school_id:
        type: string
      session_id:
        type: string
      teacher_id:
        type: string
    required:
    - class_arm_id
    - class_level_id
    - school_id
    - session_id
    type: object
  dto.CreatePaymentIntentRequest:
    properties:
      cancel_url:
        type: string
      subscription_id:
        type: string
      success_url:
        type: string
    required:
    - subscription_id
    type: object
  dto.CreateQuestionRequest:
    properties:
      bloom_level:
        enum:
        - remember
        - understand
        - apply
        - analyse
        - evaluate
        - create
        type: string
      correct_answer:
        type: string
      difficulty:
        enum:
        - easy
        - medium
        - hard
        - expert
        type: string
      explanation:
        type: string
      marks:
        minimum: 1
        type: integer
      options:
        additionalProperties:
          type: string
        type: object
      question_text:
        type: string
      question_type:
        enum:
        - single_choice
        - multiple_choice
        - true_false
        - essay
        - fill_blank
        type: string
      sub_topic:
        type: string
      subject_id:
        type: string
      tags:
        items:
          type: string
        type: array
      time_limit_seconds:
        type: integer
      topic:
        type: string
    required:
    - bloom_level
    - correct_answer
    - difficulty
    - marks
    - question_text
    - question_type
    - subject_id
    type: object
  dto.CreateSchoolRequest:
    properties:
      address:
        type: string
      code:
        description: 'changed: required → omitempty'
        maxLength: 50
        minLength: 2
        type: string
      email:
        type: string
      logo:
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      phone:
        type: string
      website:
        type: string
    required:
    - name
    type: object
  dto.CreateSessionRequest:
    properties:
      end_date:
        type: string
      is_current:
        type: boolean
      name:
        type: string
      school_id:
        type: string
      start_date:
        type: string
    required:
    - end_date
    - name
    - school_id
    - start_date
    type: object
  dto.CreateStudentRequest:
    properties:
      address:
        type: string
      admission_no:
        type: string
      class_id:
        type: string
      date_of_birth:
        type: string
      gender:
        enum:
        - Male
        - Female
        - Other
        type: string
      guardian_email:
        type: string
      guardian_name:
        type: string
      guardian_phone:
        type: string
      school_id:
        type: string
      user_id:
        type: string
    required:
    - admission_no
    - school_id
    - user_id
    type: object
  dto.CreateSubscriptionRequest:
    properties:
      auto_renew:
        type: boolean
      callback_url:
        type: string
      cancel_url:
        type: string
      email:
        type: string
      gateway:
        enum:
        - stripe
        - paystack
        - flutterwave
        type: string
      interval:
        enum:
        - monthly
        - quarterly
        - yearly
        type: string
      metadata:
        additionalProperties: true
        type: object
      payment_method:
        enum:
        - card
        - bank_transfer
        - wallet
        - ussd
        - qr
        type: string
      school_id:
        type: string
      success_url:
        type: string
      tier:
        enum:
        - basic
        - premium
        - enterprise
        type: string
    required:
    - email
    - gateway
    - interval
    - school_id
    - tier
    type: object
  dto.CreateTagRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateTermRequest:
    properties:
      end_date:
        type: string
      is_current:
        type: boolean
      name:
        type: string
      session_id:
        type: string
      start_date:
        type: string
      term_number:
        maximum: 3
        minimum: 1
        type: integer
    required:
    - end_date
    - session_id
    - start_date
    - term_number
    type: object
  dto.Disable2FARequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  dto.Enable2FARequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  dto.FilterQuestionsRequest:
    properties:
      bloom_level:
        items:
          type: string
        type: array
      difficulty:
        items:
          type: string
        type: array
      limit:
        type: integer
      page:
        type: integer
      question_type:
        items:
          type: string
        type: array
      search:
        type: string
      status:
        type: string
      subject_id:
        type: string
      tags:
        items:
          type: string
        type: array
      topic:
        type: string
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      phone_number:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  dto.RenewSubscriptionRequest:
    properties:
      interval:
        enum:
        - monthly
        - quarterly
        - yearly
        type: string
    required:
    - interval
    type: object
  dto.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  dto.SaveAnswerRequest:
    properties:
      attempt_id:
        type: string
      question_id:
        type: string
      selected_answer:
        enum:
        - A
        - B
        - C
        - D
        type: string
      time_spent:
        type: integer
    required:
    - attempt_id
    - question_id
    - selected_answer
    type: object
  dto.SendOTPRequest:
    properties:
      email:
        type: string
      type:
        enum:
        - email_verification
        - password_reset
        type: string
    required:
    - email
    - type
    type: object
  dto.StartExamRequest:
    properties:
      device_info:
        type: string
      exam_id:
        type: string
      ip_address:
        type: string
      student_id:
        type: string
    required:
    - exam_id
    - student_id
    type: object
  dto.SubmitExamRequest:
    properties:
      attempt_id:
        type: string
    required:
    - attempt_id
    type: object
  dto.UpdateClassArmRequest:
    properties:
      arm_code:
        type: string
      capacity:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      room_number:
        type: string
      sort_order:
        type: integer
    type: object
  dto.UpdateClassLevelRequest:
    properties:
      category:
        type: string
      is_active:
        type: boolean
      level_number:
        type: integer
      name:
        type: string
      promotion_to:
        type: string
      sort_order:
        type: integer
    type: object
  dto.UpdateClassRequest:
    properties:
      is_active:
        type: boolean
      room_number:
        type: string
      teacher_id:
        type: string
    type: object
  dto.UpdateQuestionRequest:
    properties:
      bloom_level:
        type: string
      correct_answer:
        type: string
      difficulty:
        type: string
      explanation:
        type: string
      marks:
        type: integer
      options:
        additionalProperties:
          type: string
        type: object
      question_text:
        type: string
      status:
        type: string
      time_limit_seconds:
        type: integer
    type: object
  dto.UpdateSchoolRequest:
    properties:
      address:
        type: string
      email:
        type: string
      is_active:
        type: boolean
      logo:
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  dto.UpdateSessionRequest:
    properties:
      end_date:
        type: string
      is_active:
        type: boolean
      is_current:
        type: boolean
      name:
        type: string
      start_date:
        type: string
    type: object
  dto.UpdateStudentRequest:
    properties:
      address:
        type: string
      class_id:
        type: string
      date_of_birth:
        type: string
      gender:
        type: string
      guardian_email:
        type: string
      guardian_name:
        type: string
      guardian_phone:
        type: string
      is_active:
        type: boolean
    type: object
  dto.UpdateSubscriptionRequest:
    properties:
      auto_renew:
        type: boolean
      cancel_at_end_date:
        type: boolean
      status:
        enum:
        - active
        - cancelled
        - pending
        - trial
        type: string
      tier:
        enum:
        - basic
        - premium
        - enterprise
        type: string
    type: object
  dto.UpdateTermRequest:
    properties:
      end_date:
        type: string
      is_active:
        type: boolean
      is_current:
        type: boolean
      name:
        type: string
      start_date:
        type: string
    type: object
  dto.VerifyEmailRequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  dto.VerifyPaymentRequest:
    properties:
      gateway:
        enum:
        - stripe
        - paystack
        - flutterwave
        type: string
      reference:
        type: string
    required:
    - gateway
    - reference
    type: object
host: localhost:8080
info:
  contact:
    email: support@cbt-api.com
    name: API Support
  description: Computer‑Based Testing API with subscriptions, academic management,
    and CBT modules.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: CBT API
  version: "1.0"
paths:
  /auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Disable 2FA for the account after verifying the TOTP code.
      parameters:
      - description: TOTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.Disable2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Disable two‑factor authentication
      tags:
      - Authentication
  /auth/2fa/enable:
    post:
      consumes:
      - application/json
      description: Verify a TOTP code and enable 2FA for the account.
      parameters:
      - description: TOTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.Enable2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Enable two‑factor authentication
      tags:
      - Authentication
  /auth/2fa/generate:
    post:
      description: Generate a TOTP secret and QR code for Google Authenticator.
      produces:
      - application/json
      responses:
        "200":
          description: message + data (TwoFactorResponse)
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Generate 2FA secret (authenticated)
      tags:
      - Authentication
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Requires current password and new password.
      parameters:
      - description: Current and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Change current user's password (authenticated)
      tags:
      - Authentication
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password reset OTP to the registered email (if exists).
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message (always same for security)
          schema:
            additionalProperties: true
            type: object
      summary: Request password reset OTP
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password. If 2FA is enabled, a 2FA
        token is required.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message + data (LoginResponse or 2FA_REQUIRED)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - Authentication
  /auth/logout:
    post:
      description: Invalidate the current session (access token). Requires authentication.
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Logout from current session
      tags:
      - Authentication
  /auth/logout-all:
    post:
      description: Invalidate all sessions for the authenticated user, except the
        current one.
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Logout from all devices
      tags:
      - Authentication
  /auth/profile:
    delete:
      description: Permanently soft‑delete the authenticated user's account.
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete user account (soft delete)
      tags:
      - Authentication
    get:
      description: Retrieve the authenticated user's profile information.
      produces:
      - application/json
      responses:
        "200":
          description: data (UserDTO)
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - Authentication
    put:
      consumes:
      - application/json
      description: Update the authenticated user's profile (first name, last name,
        phone number).
      parameters:
      - description: Profile fields
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Obtain a new access token using a valid refresh token.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message + data (TokenResponse)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh access token
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account (student role by default). An email verification
        OTP will be sent.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: message + data (LoginResponse)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Authentication
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Change password after verifying the reset OTP.
      parameters:
      - description: Reset details (email, code, new_password)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Reset password using OTP
      tags:
      - Authentication
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: Send a one‑time passcode to the user's email address.
      parameters:
      - description: OTP request (email, type)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Send OTP for email verification or password reset
      tags:
      - Authentication
  /auth/sessions:
    get:
      description: List all active sessions for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: data (list of sessions)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all active sessions
      tags:
      - Authentication
  /auth/sessions/{sessionId}:
    delete:
      description: Force logout a device by revoking its session.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Revoke a specific session
      tags:
      - Authentication
  /auth/verify-2fa:
    post:
      consumes:
      - application/json
      description: Complete 2FA authentication after login returned "2FA_REQUIRED".
      parameters:
      - description: 2FA verification
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: message + data (LoginResponse)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Verify 2FA code during login
      tags:
      - Authentication
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Confirm the user's email using the code received via /send-otp.
      parameters:
      - description: Verification code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Verify email address with OTP
      tags:
      - Authentication
  /class-arms:
    post:
      consumes:
      - application/json
      description: Add a class arm (e.g., "Section A") for a school.
      parameters:
      - description: Class arm details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClassArmRequest'
      produces:
      - application/json
      responses:
        "201":
          description: message + data
          schema:
